---
doc_id: DOC-INFRA-0012
---
name: contracts-compat
on:
  pull_request:
    paths:
      - 'contracts/**'
  push:
    branches: [ master ]
    paths:
      - 'contracts/**'
jobs:
  compat-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install jsonschema
      - name: Check schema compatibility
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/master' }}
        run: python ci/2099900008260118_check_schema_compat.py
