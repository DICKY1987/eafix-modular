name: Registry Validation (Shadow)

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'EAFIX_auth_docs/01_canonical_registries/**'
      - 'EAFIX_auth_docs/generated/registries/**'
      - 'tools/registries/**'
      - 'tests/registries/**'
      - '.github/workflows/registry-validation.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'EAFIX_auth_docs/01_canonical_registries/**'
      - 'EAFIX_auth_docs/generated/registries/**'
      - 'tools/registries/**'
      - 'tests/registries/**'
      - '.github/workflows/registry-validation.yml'

jobs:
  registry-shadow-validation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validator dependency
        run: python -m pip install jsonschema
      - name: Run registry unit tests
        run: python -m unittest discover -s tests/registries -p 'test_*.py'
      - name: Validate and compare generated outputs (report-only)
        continue-on-error: true
        run: python tools/registries/build_registries.py --check --report-only
      - name: Regenerate reports for artifact upload
        run: python tools/registries/build_registries.py --report-only
      - name: Upload registry reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: registry-shadow-reports
          path: EAFIX_auth_docs/generated/registries/
          retention-days: 14
